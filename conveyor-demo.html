<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isometric Conveyor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a0e08;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: system-ui, sans-serif;
  overflow: hidden;
  user-select: none;
}

#scene {
  width: 860px;
  height: 480px;
  position: relative;
}

/* ---- Isometric belt (rectangle rotated to match cup path) ---- */
#beltWrap {
  position: absolute;
  top: 50%; left: 50%;
  width: 700px;
  height: 90px;
  margin-left: -350px;
  margin-top: -45px;
  transform: scale(1, 0.5) rotate(-49deg);
  transform-origin: center center;
  z-index: 1;
  pointer-events: none;
}

#beltSurface {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #4a3a2a, #3a2a18, #4a3a2a);
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 0 3px #2a1a0e, 0 12px 32px rgba(0,0,0,0.6);
}

/* Belt edge glow */
#beltSurface::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(0,0,0,0.35) 0%, transparent 18%,
    transparent 82%, rgba(0,0,0,0.25) 100%
  );
}

/* Animated belt stripes */
#beltStripes {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent 0px, transparent 21px,
    rgba(255,255,255,0.04) 21px, rgba(255,255,255,0.04) 22px,
    transparent 22px, transparent 44px,
    rgba(255,255,255,0.025) 44px, rgba(255,255,255,0.025) 45px
  );
  background-size: 45px 100%;
  background-position: 0 0;
  transition: none;
}
#beltStripes.scroll {
  animation: stripeScroll 0.4s ease-out;
}
#beltStripes.scroll-fast {
  animation: stripeScroll 0.2s ease-out;
}

@keyframes stripeScroll {
  0% { background-position: 0 0; }
  100% { background-position: -90px 0; }
}

/* Belt pulse on full cup */
@keyframes beltPulse {
  0% { box-shadow: 0 0 0 3px #2a1a0e, 0 12px 32px rgba(0,0,0,0.6); }
  50% { box-shadow: 0 0 0 3px #d09050, 0 0 40px rgba(200,128,64,0.3), 0 12px 32px rgba(0,0,0,0.6); }
  100% { box-shadow: 0 0 0 3px #2a1a0e, 0 12px 32px rgba(0,0,0,0.6); }
}
#beltSurface.pulse {
  animation: beltPulse 0.5s ease-out;
}

/* ---- Cups ---- */
#cupsRow {
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
}

.cup-wrap {
  position: absolute;
  pointer-events: auto;
  cursor: pointer;
  transition: all 0.45s cubic-bezier(0.34, 1.4, 0.64, 1);
  z-index: 4;
}

.cup-wrap.active {
  z-index: 10;
  filter: drop-shadow(0 0 18px rgba(200,128,64,0.35));
  cursor: pointer;
}

.cup-wrap.active .cup-body {
  box-shadow: inset 0 -6px 12px rgba(0,0,0,0.12), 0 0 12px rgba(200,128,64,0.15);
}

/* Cup body */
.cup-body {
  position: relative;
  width: 62px;
  height: 54px;
  border-radius: 0 0 14px 14px;
  border: 3px solid;
  border-top: none;
  overflow: hidden;
  box-shadow: inset 0 -6px 12px rgba(0,0,0,0.12);
}

.cup-fill {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 0%;
  background: linear-gradient(180deg, #6a3a1e, #4a2810);
  transition: height 0.08s ease-out;
  overflow: hidden;
}

/* Coffee surface oval at top of fill */
.cup-fill-surface {
  position: absolute;
  top: -1px;
  left: -3px;
  right: -3px;
  height: 6px;
  background: radial-gradient(ellipse at 50% 50%, #9a6040, #6a3820);
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.2s;
}
.cup-fill.show-surface .cup-fill-surface {
  opacity: 1;
}

.cup-fill-surface::after {
  content: '';
  position: absolute;
  top: 1px;
  left: 3px;
  right: 3px;
  height: 3px;
  background: radial-gradient(ellipse at 50% 50%, rgba(200,160,120,0.25), transparent);
  border-radius: 50%;
}

/* Fill glow near full */
.cup-fill-glow {
  position: absolute;
  top: 0;
  left: -8px;
  right: -8px;
  height: 20px;
  background: radial-gradient(ellipse at 50% 0%, rgba(200,128,64,0.2), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.cup-fill.show-surface .cup-fill-glow {
  opacity: 1;
}

.cup-rim {
  width: 66px;
  height: 10px;
  margin-left: -2px;
  border-radius: 6px 6px 0 0;
  border: 2px solid rgba(0,0,0,0.08);
  border-bottom: none;
}
.cup-handle {
  position: absolute;
  right: -11px;
  top: 14px;
  width: 16px;
  height: 24px;
  border: 3px solid rgba(0,0,0,0.12);
  border-left: none;
  border-radius: 0 16px 16px 0;
  background: transparent;
}
.cup-shine {
  position: absolute;
  top: 5px;
  bottom: 5px;
  left: 6px;
  width: 8px;
  background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
  border-radius: 4px;
  pointer-events: none;
  z-index: 1;
}

/* ---- Steam ---- */
.steam-group {
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 5px;
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
  z-index: 5;
  width: 100px;
  justify-content: center;
  flex-wrap: wrap;
}
.steam-group.active { opacity: 1; }
.steam-group span {
  width: 5px;
  border-radius: 5px;
  background: linear-gradient(to top, rgba(255,255,255,0.08), rgba(255,255,255,0.18));
  animation: steamUp 1.5s ease-out infinite;
}
.steam-group span:nth-child(1) { height: 10px; animation-delay: 0s; }
.steam-group span:nth-child(2) { height: 16px; animation-delay: 0.12s; }
.steam-group span:nth-child(3) { height: 8px; animation-delay: 0.28s; }
.steam-group span:nth-child(4) { height: 14px; animation-delay: 0.4s; }
.steam-group span:nth-child(5) { height: 7px; animation-delay: 0.55s; }
.steam-group span:nth-child(6) { height: 12px; animation-delay: 0.08s; }
.steam-group span:nth-child(7) { height: 9px; animation-delay: 0.48s; }
.steam-group span:nth-child(8) { height: 11px; animation-delay: 0.2s; }
@keyframes steamUp {
  0% { transform: translateY(0) scaleX(1) translateX(0); opacity: 0.5; }
  50% { opacity: 0.6; }
  100% { transform: translateY(-32px) scaleX(0.3) translateX(6px); opacity: 0; }
}

/* ---- Cup Designs (10 distinct looks) ---- */

/* d-0: White ceramic */
.d-0 .cup-body { background: linear-gradient(180deg, #f8f4ec, #e8e0d4); border-color: #c8c0b0; }
.d-0 .cup-rim { background: linear-gradient(180deg, #f8f4ec, #e8e0d4); }
.d-0 .cup-handle { border-color: #c8c0b0; }

/* d-1: Red mug */
.d-1 .cup-body { background: linear-gradient(180deg, #f06858, #d03828); border-color: #a02818; }
.d-1 .cup-rim { background: linear-gradient(180deg, #f06858, #d03828); }
.d-1 .cup-handle { border-color: #d03828; }

/* d-2: Blue dots */
.d-2 .cup-body {
  background:
    radial-gradient(circle at 25% 35%, rgba(255,255,255,0.2) 3px, transparent 3px),
    radial-gradient(circle at 65% 25%, rgba(255,255,255,0.15) 4px, transparent 4px),
    radial-gradient(circle at 45% 65%, rgba(255,255,255,0.2) 3px, transparent 3px),
    radial-gradient(circle at 80% 55%, rgba(255,255,255,0.15) 3px, transparent 3px),
    radial-gradient(circle at 15% 60%, rgba(255,255,255,0.12) 3px, transparent 3px),
    linear-gradient(180deg, #5880c8, #4068b0);
  border-color: #305090;
}
.d-2 .cup-rim { background: linear-gradient(180deg, #5880c8, #4068b0); }
.d-2 .cup-handle { border-color: #4068b0; }

/* d-3: Green matte */
.d-3 .cup-body { background: linear-gradient(180deg, #5a9050, #407038); border-color: #2a5820; }
.d-3 .cup-rim { background: linear-gradient(180deg, #5a9050, #407038); }
.d-3 .cup-handle { border-color: #407038; }

/* d-4: Yellow stripe */
.d-4 .cup-body {
  background:
    linear-gradient(0deg, transparent 0%, transparent 38%, rgba(200,80,40,0.4) 38%, rgba(200,80,40,0.4) 44%, transparent 44%, transparent 67%, rgba(200,80,40,0.4) 67%, rgba(200,80,40,0.4) 73%, transparent 73%),
    linear-gradient(180deg, #f0d858, #e0c038);
  border-color: #b89820;
}
.d-4 .cup-rim { background: linear-gradient(180deg, #f0d858, #e0c038); }
.d-4 .cup-handle { border-color: #d0a828; }

/* d-5: Dark ceramic */
.d-5 .cup-body { background: linear-gradient(180deg, #4a3a30, #2a1e14); border-color: rgba(255,255,255,0.12); }
.d-5 .cup-rim { background: linear-gradient(180deg, #4a3a30, #2a1e14); border-color: rgba(255,255,255,0.08); }
.d-5 .cup-handle { border-color: #2a1e14; }

/* d-6: Terracotta */
.d-6 .cup-body { background: linear-gradient(180deg, #d88858, #c07040); border-color: #a05830; }
.d-6 .cup-rim { background: linear-gradient(180deg, #d88858, #c07040); }
.d-6 .cup-handle { border-color: #c07040; }

/* d-7: Pink gradient with diamond pattern */
.d-7 .cup-body {
  background:
    repeating-linear-gradient(45deg, transparent 0px, transparent 6px, rgba(255,255,255,0.1) 6px, rgba(255,255,255,0.1) 7px),
    repeating-linear-gradient(-45deg, transparent 0px, transparent 6px, rgba(255,255,255,0.1) 6px, rgba(255,255,255,0.1) 7px),
    linear-gradient(180deg, #e888a0, #d06078);
  border-color: #b04058;
}
.d-7 .cup-rim { background: linear-gradient(180deg, #e888a0, #d06078); }
.d-7 .cup-handle { border-color: #d06078; }

/* d-8: Turquoise with wave line */
.d-8 .cup-body {
  background:
    linear-gradient(0deg, transparent 0%, transparent 52%, rgba(255,255,255,0.08) 52%, rgba(255,255,255,0.08) 53%, transparent 53%, transparent 100%),
    linear-gradient(180deg, #40b0a0, #289080);
  border-color: #187060;
}
.d-8 .cup-rim { background: linear-gradient(180deg, #40b0a0, #289080); }
.d-8 .cup-handle { border-color: #289080; }

/* d-9: Purple metallic with speckles */
.d-9 .cup-body {
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08) 1px, transparent 1px),
    radial-gradient(circle at 70% 40%, rgba(255,255,255,0.06) 1px, transparent 1px),
    radial-gradient(circle at 40% 70%, rgba(255,255,255,0.08) 1px, transparent 1px),
    radial-gradient(circle at 80% 15%, rgba(255,255,255,0.06) 1px, transparent 1px),
    radial-gradient(circle at 10% 80%, rgba(255,255,255,0.06) 1px, transparent 1px),
    linear-gradient(180deg, #7860b8, #5840a0);
  border-color: #402880;
}
.d-9 .cup-rim { background: linear-gradient(180deg, #7860b8, #5840a0); }
.d-9 .cup-handle { border-color: #5840a0; }

/* ---- Advance animations ---- */
@keyframes cupExitBounce {
  0% { transform: scale(var(--s,1)) translateY(0); opacity: 1; }
  30% { transform: scale(calc(var(--s,1) * 0.9)) translateY(-6px); opacity: 0.9; }
  100% { transform: scale(calc(var(--s,1) * 0.6)) translateY(12px); opacity: 0; }
}
.cup-wrap.exiting .cup-inner {
  animation: cupExitBounce 0.35s ease-in forwards;
}

@keyframes cupEnterBounce {
  0% { transform: scale(0.4) translateY(14px); opacity: 0; }
  40% { transform: scale(1.15) translateY(-3px); opacity: 1; }
  70% { transform: scale(0.95) translateY(1px); }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}
.cup-wrap.entering .cup-inner {
  animation: cupEnterBounce 0.4s ease-out forwards;
}

@keyframes cupFillPulse {
  0% { transform: scale(1); }
  30% { transform: scale(1.06); }
  60% { transform: scale(0.97); }
  100% { transform: scale(1); }
}
.cup-wrap.active .cup-inner:not(.no-pulse) {
  animation: cupPulseGlow 2s ease-in-out infinite;
}
@keyframes cupPulseGlow {
  0%, 100% { filter: drop-shadow(0 0 6px rgba(200,128,64,0.15)); }
  50% { filter: drop-shadow(0 0 22px rgba(200,128,64,0.4)); }
}

/* ---- UI ---- */
#ui {
  position: absolute;
  bottom: 16px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 20;
}
#hint {
  color: #b09070;
  font-size: 0.9rem;
  font-weight: 500;
  margin-bottom: 6px;
}
#stats {
  display: flex;
  justify-content: center;
  gap: 44px;
}
.stat-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #8a7a6a;
  font-weight: 600;
}
.stat-value {
  font-size: 1.4rem;
  font-weight: 800;
  color: #f5e0c0;
}

/* ---- FX ---- */
.burst {
  position: fixed;
  pointer-events: none;
  font-size: 0.85rem;
  font-weight: 700;
  color: #d09050;
  z-index: 100;
  animation: burstFly 0.6s ease-out forwards;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}
@keyframes burstFly {
  0% { opacity: 1; transform: translateY(0) scale(0.5); }
  100% { opacity: 0; transform: translateY(-50px) scale(1.3); }
}

.pop {
  position: fixed;
  pointer-events: none;
  width: 8px; height: 8px;
  border-radius: 50%;
  z-index: 99;
  animation: popFly 0.5s ease-out forwards;
}
@keyframes popFly {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
}

.full-burst {
  position: fixed;
  pointer-events: none;
  font-size: 1.2rem;
  font-weight: 800;
  color: #f0c860;
  z-index: 100;
  animation: fullBurst 0.9s ease-out forwards;
  text-shadow: 0 0 12px rgba(200,128,64,0.5);
}
@keyframes fullBurst {
  0% { opacity: 1; transform: translateY(0) scale(0.5); }
  50% { opacity: 1; transform: translateY(-20px) scale(1.3); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.6); }
}
</style>
</head>
<body>

<div id="scene">
  <div id="beltWrap">
    <div id="beltSurface">
      <div id="beltStripes"></div>
    </div>
  </div>
  <div id="cupsRow"></div>

  <div id="ui">
    <div id="hint">☕ Click the center cup</div>
    <div id="stats">
      <div><div class="stat-label">Served</div><div class="stat-value" id="countDisplay">0</div></div>
      <div><div class="stat-label">Per Click</div><div class="stat-value" id="powerDisplay">1</div></div>
    </div>
  </div>
</div>

<script>
'use strict';

const VISIBLE = 5;
const FILL_MAX = 100;
const DESIGNS = [{ id: 0 }, { id: 1 }, { id: 2 }, { id: 3 }, { id: 4 }, { id: 5 }, { id: 6 }, { id: 7 }, { id: 8 }, { id: 9 }];

/* Cups sit on the isometric belt. Belt visual axis is at ~-30deg (bottom-left to top-right).
   All cups same scale except the active (center) cup which is bigger. */
const DIAG_X = 106;
const DIAG_Y = 62;
const BASE_X = 430;
const BASE_Y = 240;
const SCALE_NORMAL = 0.95;
const SCALE_ACTIVE = 1.25;

let cups = [];
let clickPower = 1;
let served = 0;
let activeIdx = 2;
let queue = [];
let busy = false;

const row = document.getElementById('cupsRow');
const hint = document.getElementById('hint');
const countDisplay = document.getElementById('countDisplay');
const powerDisplay = document.getElementById('powerDisplay');
const beltStripes = document.getElementById('beltStripes');
const beltSurface = document.getElementById('beltSurface');

function randDesign() { return DESIGNS[Math.floor(Math.random() * DESIGNS.length)]; }

function cupPos(index) {
  const offset = index - 2;
  return {
    x: BASE_X + offset * DIAG_X,
    y: BASE_Y - offset * DIAG_Y,
  };
}

function makeCup(design) {
  const w = document.createElement('div');
  w.className = 'cup-wrap d-' + design.id;
  w.innerHTML = `
    <div class="cup-inner">
      <div class="steam-group"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <div class="cup-handle"></div>
      <div class="cup-rim"></div>
      <div class="cup-body">
        <div class="cup-fill">
          <div class="cup-fill-surface"></div>
          <div class="cup-fill-glow"></div>
        </div>
        <div class="cup-shine"></div>
      </div>
    </div>`;
  return w;
}

function reposition(animate) {
  cups.forEach((c, i) => {
    const pos = cupPos(i);
    const el = c.el;
    const scale = i === activeIdx ? SCALE_ACTIVE : SCALE_NORMAL;
    el.style.left = (pos.x - 31) + 'px';
    el.style.top = (pos.y - 40) + 'px';
    el.style.transform = 'scale(' + scale + ')';
    el.style.transformOrigin = 'center bottom';
    el.style.transition = animate ? 'all 0.45s cubic-bezier(0.34, 1.4, 0.64, 1)' : 'none';
    el.className = 'cup-wrap d-' + c.design.id;
    el.classList.toggle('active', i === activeIdx);
    el.style.zIndex = 4 + i;
    el.querySelector('.cup-inner').classList.toggle('no-pulse', i !== activeIdx);
  });
}

function spawn() {
  const d = randDesign();
  const el = makeCup(d);
  return { el, fill: 0, full: false, design: d, fillEl: el.querySelector('.cup-fill') };
}

function init() {
  row.innerHTML = '';
  cups = []; queue = [];
  for (let i = 0; i < VISIBLE + 6; i++) queue.push(spawn());
  for (let i = 0; i < VISIBLE; i++) {
    const c = queue.shift();
    row.appendChild(c.el);
    cups.push(c);
  }
  activeIdx = 2;
  reposition(false);
}

function advance() {
  if (busy) return;
  const a = cups[activeIdx];
  if (!a || !a.full) return;
  busy = true;

  a.el.classList.remove('active');

  // Belt scroll + pulse
  beltStripes.classList.remove('scroll');
  void beltStripes.offsetWidth;
  beltStripes.classList.add('scroll');

  beltSurface.classList.remove('pulse');
  void beltSurface.offsetWidth;
  beltSurface.classList.add('pulse');

  // Particles at exiting cup
  const rect = a.el.querySelector('.cup-inner').getBoundingClientRect();
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'pop';
    p.style.background = ['#d09050','#e0a060','#f0c860'][i % 3];
    const cx = rect.left + rect.width * 0.5;
    const cy = rect.top + rect.height * 0.4;
    p.style.left = (cx - 4) + 'px';
    p.style.top = (cy - 4) + 'px';
    p.style.setProperty('--dx', (Math.random() * 60 - 30) + 'px');
    p.style.setProperty('--dy', (Math.random() * -60 - 10) + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 500);
  }

  setTimeout(() => {
    // Animate exiting cup
    a.el.style.transition = 'none';
    a.el.style.transform = 'scale(' + SCALE_NORMAL + ')';
    a.el.querySelector('.cup-inner').style.animation = 'none';
    void a.el.offsetWidth;
    a.el.classList.add('exiting');

    setTimeout(() => {
      const removed = cups.shift();
      removed.el.remove();

      let next = queue.shift();
      if (!next) next = spawn();
      cups.push(next);
      row.appendChild(next.el);

      // Enter animation on new cup
      const newEl = next.el;
      newEl.style.transition = 'none';
      newEl.querySelector('.cup-inner').style.animation = 'none';
      void newEl.offsetWidth;
      reposition(true);
      newEl.classList.add('entering');

      // Belt stripe burst
      beltStripes.classList.remove('scroll-fast');
      void beltStripes.offsetWidth;
      beltStripes.classList.add('scroll-fast');

      setTimeout(() => {
        newEl.classList.remove('entering');
        busy = false;
      }, 450);
    }, 350);
  }, 300);
}

function fill() {
  if (busy) return;
  const a = cups[activeIdx];
  if (!a || a.full) return;

  a.fill = Math.min(FILL_MAX, a.fill + clickPower);
  const pct = a.fill / FILL_MAX * 100;
  a.fillEl.style.height = pct + '%';
  a.fillEl.classList.toggle('show-surface', pct >= 85);

  if (a.fill > 8) {
    a.el.querySelector('.steam-group').classList.add('active');
  }

  // Fill burst
  const rect = a.el.querySelector('.cup-inner').getBoundingClientRect();
  const cx = rect.left + rect.width * 0.5;
  const cy = rect.top + rect.height * 0.25;

  const b = document.createElement('div');
  b.className = 'burst';
  b.textContent = '+' + clickPower;
  b.style.left = (cx - 8) + 'px';
  b.style.top = (cy + 8) + 'px';
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 600);

  // Tiny pop particles on each click
  for (let i = 0; i < 2; i++) {
    const p = document.createElement('div');
    p.className = 'pop';
    p.style.background = '#d09050';
    p.style.left = (cx + (Math.random() - 0.5) * 20) + 'px';
    p.style.top = (cy + (Math.random() - 0.5) * 10) + 'px';
    p.style.setProperty('--dx', (Math.random() * 30 - 15) + 'px');
    p.style.setProperty('--dy', (Math.random() * -40 - 10) + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 500);
  }

  if (a.fill >= FILL_MAX) {
    a.full = true;
    served++;
    clickPower = 1 + Math.floor(served / 5);
    countDisplay.textContent = served;
    powerDisplay.textContent = clickPower;
    a.el.classList.add('just-filled');

    // Full cup celebratory burst
    const fb = document.createElement('div');
    fb.className = 'full-burst';
    fb.textContent = '☕ FULL!';
    fb.style.left = (cx - 30) + 'px';
    fb.style.top = (cy - 20) + 'px';
    document.body.appendChild(fb);
    setTimeout(() => fb.remove(), 900);

    // Bigger particles on full
    for (let i = 0; i < 10; i++) {
      const p = document.createElement('div');
      p.className = 'pop';
      p.style.width = (6 + Math.random() * 6) + 'px';
      p.style.height = p.style.width;
      p.style.background = ['#d09050','#e0a060','#f0c860','#f5e0c0','#c07040'][i % 5];
      const pcx = rect.left + Math.random() * rect.width;
      const pcy = rect.top + Math.random() * rect.height * 0.5;
      p.style.left = (pcx - 4) + 'px';
      p.style.top = (pcy - 4) + 'px';
      p.style.setProperty('--dx', (Math.random() * 80 - 40) + 'px');
      p.style.setProperty('--dy', (Math.random() * -70 - 20) + 'px');
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 500);
    }

    setTimeout(advance, 450);
  }
}

document.addEventListener('click', (e) => {
  const w = e.target.closest('.cup-wrap');
  if (!w) return;
  const idx = cups.findIndex(c => c.el === w);
  if (idx === -1) return;
  if (idx === activeIdx) { fill(); }
  else {
    hint.textContent = '☕ Click the CENTER cup!';
    setTimeout(() => { hint.textContent = '☕ Click the center cup'; }, 800);
  }
});

init();
</script>
</body>
</html>
