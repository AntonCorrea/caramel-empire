<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Conveyor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-inner">
        <h1>☕ Caramel Empire</h1>
        <div class="header-actions">
          <button id="pauseBtn" class="icon-btn" title="Pause/Resume" aria-label="Toggle pause">⏸</button>
          <button id="soundBtn" class="icon-btn" title="Toggle Sound" aria-label="Toggle sound">🔊</button>
        </div>
      </div>
    </header>

    <div id="stats">
      <div class="stat">
        <div>
          <div class="stat-label">Served ☕</div>
          <div id="servedDisplay" class="stat-value">0</div>
        </div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div>
          <div class="stat-label">Missed ⏰</div>
          <div id="missedDisplay" class="stat-value">0</div>
        </div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div>
          <div class="stat-label">Rating</div>
          <div id="ratingDisplay" class="stat-value">10% ★☆☆☆☆</div>
        </div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div>
          <div class="stat-label">Money 💰</div>
          <div id="moneyDisplay" class="stat-value">0</div>
        </div>
      </div>
    </div>

    <div id="gamePanel">
      <div id="scene">
        <!-- Background layers -->
        <div class="bg-wall" id="bgWall">
          <div class="bg-wall-inner" id="bgWallInner"></div>
        </div>
        <div class="bg-pattern" id="bgPattern"></div>
        <div class="bg-warmth"></div>
        <div class="bg-baseboard"></div>
        <div class="bg-wainscot"></div>
        <div class="bg-floor"></div>
        <div id="furnitureLayer"></div>
        <div class="bg-counter"><div class="counter-top"></div></div>

        <div id="hintLog"></div>
        <div id="cupsRow"></div>
        <div id="orderTimerWrap">
          <svg viewBox="0 0 40 40" width="56" height="56">
            <circle cx="20" cy="20" r="17" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
            <circle id="timerArc" cx="20" cy="20" r="17" fill="none" stroke="#d8b89a" stroke-width="3" stroke-linecap="round" transform="rotate(-90 20 20)" stroke-dasharray="106.814" stroke-dashoffset="0"/>
            <text id="timerText" x="20" y="24" text-anchor="middle" fill="#e8dcc8" font-size="10" font-weight="700" font-family="'Segoe UI',sans-serif">—</text>
          </svg>
        </div>
        <div id="pauseOverlay"><span>⏸ PAUSED</span></div>
      </div>

      <div id="orderPanel">
        <div id="orderHeader">
          <span id="orderName">—</span>
        </div>
        <div id="orderChecklist"></div>
      </div>

      <div id="ingredientBar"></div>
    </div>

    <section id="shop">
      <div class="shop-header">
        <h2>🧰 Upgrades</h2>
        <span class="shop-money"><span id="shopMoneyDisplay">0</span></span>
        <button id="resetBtn" class="reset-btn" title="Reset progress">🗑️</button>
      </div>
      <div id="upgrades"></div>
    </section>
  </div>

  <canvas id="particleCanvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
